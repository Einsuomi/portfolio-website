# Mechanical merge gate: nothing reaches main unless this is green.
# Branch protection requires the "checks" job; "lighthouse" is informational
# until it proves stable on the heavy scrollytelling pages.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Type and syntax check
        run: npx astro check
      - name: Production build
        run: npm run build
      - name: Confidential leak scan
        run: npm run check-leaks
      - name: Track API contract (rejection paths; happy path needs secrets, skipped here)
        run: node scripts/verify-track-api.mjs
        env:
          CI: 'true'
      - name: UI anti-pattern report (informational, never fails the build)
        run: node .claude/skills/impeccable/scripts/detect.mjs src/ || true

  # Informational only — not a required gate yet while we prove out flakiness.
  # Once stable, add verify-ui to the branch protection required jobs.
  verify-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium browser
        run: npx playwright install --with-deps chromium
      # Note: verify-ui uses `astro dev` (not `astro preview`) because the
      # @astrojs/vercel adapter does not support `astro preview`. No prior
      # build needed — astro dev serves source files directly.
      - name: UI quality harness (collision, overflow, a11y, console errors)
        run: npm run verify-ui

  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Lighthouse with performance budgets (LCP < 2.5s, JS < 300 KB)
        # static output lands in dist/client once the Vercel adapter is present,
        # plain dist/ before that — detect whichever this branch produces
        run: |
          DIST=$([ -d dist/client ] && echo dist/client || echo dist)
          npx --yes @lhci/cli@0.14.x autorun --collect.staticDistDir="$DIST"
